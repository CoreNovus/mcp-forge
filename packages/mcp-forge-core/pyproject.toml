[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcp-forge-core"
version = "0.1.0"
description = "Protocol-based framework for building MCP servers — clean interfaces, swappable providers"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Convilyn", email = "dev@convilyn.com" }]
keywords = ["mcp", "model-context-protocol", "agents", "llm", "framework"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0,<3.0",
    "pydantic-settings>=2.0,<3.0",
    "mcp>=1.0,<2.0",
]

[project.optional-dependencies]
aws = ["mcp-forge-aws"]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "ruff>=0.4",
    "mypy>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_forge_core"]
